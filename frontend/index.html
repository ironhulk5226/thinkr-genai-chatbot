<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
    <title>Thinkr</title>
</head>
<body>
    <div class="aurora-bg" aria-hidden="true"></div>

    <header class="topbar">
        <a class="brand" href="#" aria-label="GenChat Home">
            <span class="brand-logo" aria-hidden="true">
                <img class="brand-logo-image" src="./public/Logo.png" alt="">
            </span>
        </a>
    </header>

    <main class="app-shell">
        <section class="chat-container" id="chat-container" aria-live="polite"></section>
    </main>

    <section class="composer-wrap" aria-label="Message composer">
        <div class="composer-panel">
            <textarea id="input" rows="2" placeholder="Ask anything..."></textarea>
            <div class="composer-actions">
                <button id="ask-btn">Ask</button>
            </div>
        </div>
    </section>
</body>
<script src="/config.js"></script>
<script type="module" src="./script.js"></script>

</html>
